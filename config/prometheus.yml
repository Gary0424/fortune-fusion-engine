"""
Prometheus 配置
"""
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'fortune-fusion-engine'
    env: 'production'

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'ffe-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          service: 'api'
    
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'cache'

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
        labels:
          service: 'database'
