# 命名空间
apiVersion: v1
kind: Namespace
metadata:
  name: fortune-fusion
  labels:
    name: fortune-fusion
---
# Secrets (生产环境应使用外部密钥管理)
apiVersion: v1
kind: Secret
metadata:
  name: ffe-secrets
  namespace: fortune-fusion
type: Opaque
stringData:
  database-url: "postgresql+asyncpg://postgres:CHANGE_ME@ffe-postgres:5432/fortune"
  db-user: "postgres"
  db-password: "CHANGE_ME"
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ffe-ingress
  namespace: fortune-fusion
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "60"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "5"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ffe.example.com
      secretName: ffe-tls
  rules:
    - host: ffe.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ffe-api
                port:
                  number: 80
---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ffe-api-pdb
  namespace: fortune-fusion
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: ffe-api
---
# NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ffe-network-policy
  namespace: fortune-fusion
spec:
  podSelector:
    matchLabels:
      app: ffe-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ffe-redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: ffe-postgres
      ports:
        - protocol: TCP
          port: 5432
    - to: []
      ports:
        - protocol: TCP
          port: 53  # DNS
