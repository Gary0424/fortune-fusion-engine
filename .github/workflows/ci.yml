name: Fortune Fusion Engine CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DOCKER_REGISTRY: ghcr.io

jobs:
  # ============== Lint & Type Check ==============
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt ruff mypy
      
      - name: Ruff lint
        run: ruff check src/ tests/
      
      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # ============== Unit Tests ==============
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fortune
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run unit tests
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost:5432/fortune
        run: |
          pytest tests/ -v --tb=short --asyncio-mode=auto
      
      - name: Run chaos tests
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql+asyncpg://postgres:test_password@localhost:5432/fortune
        run: |
          python -m uvicorn src.api.main:app --port 8000 &
          sleep 5
          python tests/chaos_test.py
          kill %1

  # ============== Build Docker Image ==============
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ github.repository }}/ffe-api
          tags: |
            type=sha,prefix=
            type=ref,event=branch
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============== Deploy to K8s ==============
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"
      
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      
      - name: Deploy
        run: |
          kubectl apply -f k8s/infra.yml
          kubectl apply -f k8s/redis-statefulset.yml
          kubectl apply -f k8s/postgres-statefulset.yml
          kubectl apply -f k8s/api-deployment.yml
          kubectl rollout status deployment/ffe-api -n fortune-fusion --timeout=120s
      
      - name: Verify deployment
        run: |
          kubectl get pods -n fortune-fusion
          kubectl get svc -n fortune-fusion
